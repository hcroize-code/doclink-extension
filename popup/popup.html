<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocLink</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo">D</div>
    <span class="header-title">DocLink</span>
    <div class="header-actions">
      <button class="icon-btn sync-btn" id="syncBtn" title="Scan Gmail now">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <button class="icon-btn" id="signOutBtn" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Auth banner (shown when not signed in) -->
  <div class="auth-banner" id="authBanner">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Sign in with Google to let DocLink detect Google Docs, Sheets and Slides links in your Gmail.</p>
    <button class="btn btn-primary" id="signInBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <!-- Main app (hidden until signed in) -->
  <div class="layout" id="appLayout" style="display:none">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div id="navInbox"
             class="nav-item active"
             data-view="pending"
             title="Pending docs waiting to be classified">
          <span class="nav-icon">📥</span>
          <span class="nav-name">En attente</span>
          <span class="nav-count" id="pendingCount">0</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Dossiers</div>
        <div id="folderList"></div>

        <!-- New folder inline input -->
        <div class="new-folder-row" id="newFolderRow">
          <input class="new-folder-input" id="newFolderInput"
                 type="text" placeholder="Nom du dossier…" maxlength="40" />
          <button class="btn btn-primary" id="newFolderConfirm" style="padding:4px 8px;">✓</button>
          <button class="btn btn-ghost"   id="newFolderCancel"  style="padding:4px 8px;">✕</button>
        </div>

        <button class="add-folder-btn" id="addFolderBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nouveau dossier
        </button>
      </div>
    </nav>

    <!-- Main panel -->
    <main class="main">
      <div class="main-header">
        <div class="main-title" id="panelTitle">En attente</div>
        <div class="main-subtitle" id="panelSubtitle">Liens Google détectés dans Gmail</div>
      </div>

      <div class="doc-list" id="docList">
        <!-- doc cards rendered here -->
      </div>
    </main>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar">Chargement…</div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="popup.js" type="module"></script>
</body>
</html>
